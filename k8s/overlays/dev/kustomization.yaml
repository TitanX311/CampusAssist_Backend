apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development overlay — namespace: dev, :dev image tags, DEBUG enabled, relaxed resources.
# Run `bash k8s/generate-secrets.sh dev` before applying to generate secret.yaml files.
# Deploy:   kubectl apply -k k8s/overlays/dev
# Teardown: kubectl delete -k k8s/overlays/dev

namespace: dev

resources:
  - ../../base
  - namespace.yaml
  # generated secrets (git-ignored) — run generate-secrets.sh dev first
  - auth_service/secret.yaml
  - postgres/secret.yaml
  - community_service/secret.yaml
  - community_postgres/secret.yaml
  - post_service/secret.yaml
  - post_postgres/secret.yaml
  - comment_service/secret.yaml
  - comment_postgres/secret.yaml
  - attachment_service/secret.yaml
  - attachment_postgres/secret.yaml
  - minio/secret.yaml
  - college_service/secret.yaml
  - college_postgres/secret.yaml
  - admin_service/secret.yaml

  # docs hub — dev only
  - docs_service/deployment.yaml
  - docs_service/service.yaml

# Use :dev image tags built locally with nerdctl
images:
  - name: darshanpanzade2006/campus_assist_auth
    newTag: dev
  - name: darshanpanzade2006/campus_assist_community
    newTag: dev
  - name: darshanpanzade2006/campus_assist_post
    newTag: dev
  - name: darshanpanzade2006/campus_assist_comment
    newTag: dev
  - name: darshanpanzade2006/campus_assist_attachment
    newTag: dev
  - name: darshanpanzade2006/campus_assist_college
    newTag: dev
  - name: darshanpanzade2006/campus_assist_admin
    newTag: dev
  - name: darshanpanzade2006/campus_assist_docs
    newTag: dev

patches:
  # Enable DEBUG and relax token expiry for development
  - path: patches/auth-service-config.yaml
  - path: patches/community-service-config.yaml
  # Reduce resource limits to ease minikube pressure
  - path: patches/auth-service-deploy.yaml
  - path: patches/community-service-deploy.yaml
  - path: patches/postgres-deploy.yaml
  - path: patches/community-postgres-deploy.yaml
  - path: patches/post-service-config.yaml
  - path: patches/post-service-deploy.yaml
  - path: patches/post-postgres-deploy.yaml
  - path: patches/comment-service-config.yaml
  - path: patches/comment-service-deploy.yaml
  - path: patches/comment-postgres-deploy.yaml
  - path: patches/attachment-service-config.yaml
  - path: patches/attachment-service-deploy.yaml
  - path: patches/attachment-postgres-deploy.yaml
  - path: patches/minio-deploy.yaml
  # College service
  - path: patches/college-service-config.yaml
  - path: patches/college-service-deploy.yaml
  - path: patches/college-postgres-deploy.yaml
  # Admin service
  - path: patches/admin-service-config.yaml
  - path: patches/admin-service-deploy.yaml
  # Scope dev ingress to its own hostname to avoid route collision with prod
  - path: patches/ingress.yaml
