# Dev overlay: tighten Redis memory limit to ease minikube pressure.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  template:
    spec:
      containers:
        - name: redis
          args:
            - "--maxmemory"
            - "64mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - ""
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
