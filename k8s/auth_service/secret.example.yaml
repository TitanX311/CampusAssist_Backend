apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: default
  labels:
    app: auth-service
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://<user>:<password>@<postgres-service>:5432/<db>"
  SECRET_KEY: "<strong-random-secret>"
  GOOGLE_CLIENT_ID: "<your-client-id>.apps.googleusercontent.com"
