apiVersion: v1
kind: Service
metadata:
  name: community-service
  namespace: default
  labels:
    app: community-service
spec:
  type: ClusterIP
  selector:
    app: community-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: grpc
      port: 50052
      targetPort: 50052
      protocol: TCP
