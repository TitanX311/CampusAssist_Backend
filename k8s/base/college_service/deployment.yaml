apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-service
  namespace: default
  labels:
    app: college-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: college-service
  template:
    metadata:
      labels:
        app: college-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z college-postgres-service 5432; do
                echo "Waiting for college-postgres-service:5432..."
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: college-service
          image: darshanpanzade2006/campus_assist_college:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
            - containerPort: 50055
              name: grpc
          envFrom:
            - configMapRef:
                name: college-service-config
            - secretRef:
                name: college-service-secret
          livenessProbe:
            httpGet:
              path: /api/college/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/college/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
