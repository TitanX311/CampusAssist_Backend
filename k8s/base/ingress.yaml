apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campus-assist-ingress
  namespace: default
  labels:
    app: campus-assist
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "52m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/community
            pathType: Prefix
            backend:
              service:
                name: community-service
                port:
                  number: 80
          - path: /api/posts
            pathType: Prefix
            backend:
              service:
                name: post-service
                port:
                  number: 80
          - path: /api/comments
            pathType: Prefix
            backend:
              service:
                name: comment-service
                port:
                  number: 80
          - path: /api/college
            pathType: Prefix
            backend:
              service:
                name: college-service
                port:
                  number: 80
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 80
          - path: /api/search
            pathType: Prefix
            backend:
              service:
                name: search-service
                port:
                  number: 80
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80
          - path: /api/feed
            pathType: Prefix
            backend:
              service:
                name: feed-service
                port:
                  number: 80
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 80
