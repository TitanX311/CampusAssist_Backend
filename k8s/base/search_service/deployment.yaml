apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: default
  labels:
    app: search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z search-postgres-service 5432; do
                echo "Waiting for search-postgres-service:5432..."
                sleep 2
              done
              echo "PostgreSQL is ready."
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for redis-service:6379..."
                sleep 2
              done
              echo "Redis is ready."
      containers:
        - name: search-service
          image: darshanpanzade2006/campus_assist_search:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: search-service-config
            - secretRef:
                name: search-service-secret
          livenessProbe:
            httpGet:
              path: /api/search/health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/search/health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
