apiVersion: v1
kind: Service
metadata:
  name: post-service
  namespace: default
  labels:
    app: post-service
spec:
  type: ClusterIP
  selector:
    app: post-service
  ports:
    - name: http
      port: 80
      targetPort: 8002
      protocol: TCP
    - name: grpc
      port: 50053
      targetPort: 50053
      protocol: TCP
