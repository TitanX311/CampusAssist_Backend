apiVersion: v1
kind: Service
metadata:
  name: attachment-service
  namespace: default
  labels:
    app: attachment-service
spec:
  type: ClusterIP
  selector:
    app: attachment-service
  ports:
    - name: http
      port: 80
      targetPort: 8004
      protocol: TCP
    - name: grpc
      port: 50054
      targetPort: 50054
      protocol: TCP
