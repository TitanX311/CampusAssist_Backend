apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests — environment-agnostic.
# Secrets are NOT listed here; each overlay provides them.
resources:
  # auth service
  - auth_service/deployment.yaml
  - auth_service/service.yaml
  - auth_service/config.yaml
  # auth postgres
  - postgres/deployment.yaml
  - postgres/service.yaml
  - postgres/pvc.yaml
  # community service
  - community_service/deployment.yaml
  - community_service/service.yaml
  - community_service/config.yaml
  # community postgres
  - community_postgres/deployment.yaml
  - community_postgres/service.yaml
  - community_postgres/pvc.yaml
  # post service
  - post_service/deployment.yaml
  - post_service/service.yaml
  - post_service/config.yaml
  # post postgres
  - post_postgres/deployment.yaml
  - post_postgres/service.yaml
  - post_postgres/pvc.yaml
  # comment service
  - comment_service/deployment.yaml
  - comment_service/service.yaml
  - comment_service/config.yaml
  # comment postgres
  - comment_postgres/deployment.yaml
  - comment_postgres/service.yaml
  - comment_postgres/pvc.yaml
  # attachment service
  - attachment_service/deployment.yaml
  - attachment_service/service.yaml
  - attachment_service/config.yaml
  # attachment postgres
  - attachment_postgres/deployment.yaml
  - attachment_postgres/service.yaml
  - attachment_postgres/pvc.yaml
  # minio object storage
  - minio/deployment.yaml
  - minio/service.yaml
  - minio/pvc.yaml
  # college service
  - college_service/deployment.yaml
  - college_service/service.yaml
  - college_service/config.yaml
  # college postgres
  - college_postgres/deployment.yaml
  - college_postgres/service.yaml
  - college_postgres/pvc.yaml
  # admin service (no DB — pure aggregation proxy)
  - admin_service/deployment.yaml
  - admin_service/service.yaml
  - admin_service/config.yaml
  # search service + postgres
  - search_service/deployment.yaml
  - search_service/service.yaml
  - search_service/config.yaml
  - search_postgres/deployment.yaml
  - search_postgres/service.yaml
  - search_postgres/pvc.yaml
  # redis cache (shared by search-service)
  - redis/deployment.yaml
  - redis/service.yaml
  # ingress
  - ingress.yaml
  - ingress-attachments.yaml
