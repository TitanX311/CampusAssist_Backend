apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: default
  labels:
    app: auth-service
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://<user>:<password>@<postgres-service>:5432/<db>"
  SECRET_KEY: "<strong-random-secret>"
  GOOGLE_CLIENT_ID: "<your-client-id>.apps.googleusercontent.com"
  # SMTP credentials for outbound email (leave empty when SKIP_EMAIL_VERIFICATION=true)
  SMTP_USERNAME: "<your-smtp-email>"
  SMTP_PASSWORD: "<your-smtp-app-password>"
