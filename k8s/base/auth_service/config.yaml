apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: default
  labels:
    app: auth-service
data:
  APP_NAME: "Auth Service"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  GRPC_PORT: "50051"
  # SMTP / outbound email
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM: "Campus Assist <assistcampus6@gmail.com>"
  SMTP_USE_TLS: "true"
  # Email verification
  EMAIL_VERIFICATION_EXPIRE_MINUTES: "1440"
  FRONTEND_URL: "http://localhost:3000"
  SKIP_EMAIL_VERIFICATION: "false"
